  <!-- Preload des 4 polices critiques (premier écran : Home + navbar + horloge).
       Démarre le téléchargement EN PARALLÈLE du CSS au lieu d'attendre que le CSS
       soit parsé. Sur connexion lente, gain de 200-800 ms sur l'apparition du texte
       en police définitive (FOUT quasi invisible). `crossorigin` obligatoire pour
       les polices auto-hébergées, sinon le preload est ignoré silencieusement. -->
  <link rel="preload" href="/fonts/bristone-display-hollow.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/bristone-display.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/worksans-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/realistic-nature.woff2" as="font" type="font/woff2" crossorigin />
</head>

</body>
